name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write       # OIDC for cosign keyless signing

jobs:
  smoke:
    name: Smoke-test release binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
          check-latest: true
          cache-dependency-path: go.sum

      - name: Build snapshot binary
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7
        with:
          version: latest
          args: build --snapshot --single-target --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke-test binary (--version, --help, status)
        run: |
          set -euo pipefail
          bin="$(find "$PWD/dist" -type f -name pvmt -perm -u+x | head -n1)"
          if [ -z "$bin" ]; then
            echo "::error::pvmt binary not found under dist/"
            exit 1
          fi
          echo "Smoke-testing $bin"
          "$bin" --version
          "$bin" --help > /dev/null
          workdir="$(mktemp -d)"
          cat > "$workdir/pvmt.toml" <<'EOF'
          [[cities]]
          name = "SmokeTest"
          EOF
          (cd "$workdir" && "$bin" status)
          rm -rf "$workdir"

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
          check-latest: true
          cache-dependency-path: go.sum

      - name: Install syft (SBOM)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY_NAME: ${{ github.event.repository.name }}
