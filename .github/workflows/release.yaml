name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write       # OIDC for cosign keyless signing

jobs:
  smoke:
    name: Smoke-test release binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26'
          check-latest: true
          cache-dependency-path: go.sum

      - name: Build snapshot binary
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          version: latest
          args: build --snapshot --single-target --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke-test binary (--version, --help, status)
        run: |
          set -euo pipefail
          bin="$(find "$PWD/dist" -type f -name pvmt -perm -u+x | head -n1)"
          if [ -z "$bin" ]; then
            echo "::error::pvmt binary not found under dist/"
            exit 1
          fi
          echo "Smoke-testing $bin"
          version_out="$("$bin" --version)"
          echo "$version_out"
          # pvmt's --version template is "pvmt {{.Version}}\n" (pkg/cmd/root/root.go).
          # When ldflags inject internal/build.Version, the output is a semver
          # (snapshot template: {{incpatch .Version}}-SNAPSHOT-{{.ShortCommit}};
          # real release: {{.Version}}). If the ldflags symbol path ever drifts
          # away from internal/build.Version, the binary falls back to the
          # VersionDev sentinel ("dev") — catch that here so the release fails
          # before publish instead of shipping a binary that reports "dev".
          if ! echo "$version_out" | grep -qE '^pvmt [0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::--version output '$version_out' is missing a semver — ldflags injection broken?"
            exit 1
          fi
          "$bin" --help > /dev/null
          workdir="$(mktemp -d)"
          cat > "$workdir/pvmt.toml" <<'EOF'
          [[cities]]
          name = "SmokeTest"
          EOF
          (cd "$workdir" && "$bin" status)
          rm -rf "$workdir"

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26'
          check-latest: true
          cache-dependency-path: go.sum

      - name: Install syft (SBOM)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY_NAME: ${{ github.event.repository.name }}
