version: 2

project_name: pvmt

before:
  hooks:
    - go mod tidy
    - make wasm
    - go run ./cmd/gendocs

builds:
  - id: pvmt
    main: ./cmd/pvmt
    binary: pvmt
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/jcrussell/solvent-streets/internal/build.Version={{.Version}}
      - -X github.com/jcrussell/solvent-streets/internal/build.Commit={{.Commit}}
      - -X github.com/jcrussell/solvent-streets/internal/build.Date={{.Date}}

archives:
  - id: pvmt
    ids:
      - pvmt
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*
      - completions/*
      - manpages/*.gz

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - id: archives
    artifacts: archive
    cmd: syft
    args:
      - "scan"
      - "${artifact}"
      - "--output"
      - "cyclonedx-json=${document}"
    documents:
      - "${artifact}.sbom.cdx.json"

# cosign keyless signing — GitHub's OIDC token authenticates to Sigstore,
# so there are no long-lived keys to manage. Signs every release artifact
# (archives, checksums, sboms, nfpms) so any downloaded file can be verified
# independently against the workflow that produced it. Output is cosign's
# new bundle format: a single JSON file per artifact embedding the
# signature, certificate, and Rekor transparency log entry.
signs:
  - cmd: cosign
    artifacts: all
    signature: "${artifact}.cosign.bundle"
    args:
      - "sign-blob"
      - "--yes"
      - "--bundle=${signature}"
      - "${artifact}"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999

nfpms:
  - id: pvmt
    package_name: pvmt
    ids:
      - pvmt
    vendor: jcrussell
    homepage: https://github.com/jcrussell/solvent-streets
    maintainer: Jon Crussell <joncrussell@gmail.com>
    description: |-
      Pure Go CLI for pavement data ingestion, hex-grid coverage analysis,
      PCI decay forecasting, and MapLibre visualization.
    license: BSD-3-Clause
    formats:
      - deb
    bindir: /usr/bin
    contents:
      - src: completions/pvmt.bash
        dst: /usr/share/bash-completion/completions/pvmt
      - src: completions/_pvmt
        dst: /usr/share/zsh/vendor-completions/_pvmt
      - src: completions/pvmt.fish
        dst: /usr/share/fish/vendor_completions.d/pvmt.fish
      - src: manpages/pvmt*.1.gz
        dst: /usr/share/man/man1/
    deb:
      lintian_overrides:
        - statically-linked-binary
        - changelog-file-missing-in-native-package

release:
  github:
    owner: jcrussell
    name: solvent-streets
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"
