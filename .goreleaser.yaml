version: 2

project_name: pvmt

before:
  hooks:
    - go mod tidy
    - make wasm
    - go run ./cmd/gendocs

builds:
  - id: pvmt
    main: ./cmd/pvmt
    binary: pvmt
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X pvmt/internal/build.Version={{.Version}}
      - -X pvmt/internal/build.Commit={{.Commit}}
      - -X pvmt/internal/build.Date={{.Date}}

archives:
  - id: pvmt
    ids:
      - pvmt
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999

release:
  github:
    owner: jcrussell
    name: solvent-streets
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"
