<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PVMT - Pavement Data Viewer</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css">
    <script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        #map { width: 100vw; height: 100vh; }
        #stats {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.95);
            padding: 16px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            max-width: 320px;
            font-size: 14px;
            z-index: 1;
        }
        #stats h2 { margin-bottom: 12px; font-size: 18px; }
        .stat-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #eee; }
        .stat-label { color: #666; }
        .stat-value { font-weight: 600; }
        .layer-toggle { margin-top: 12px; }
        .layer-toggle label { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px 0; }
        .legend-dot { width: 12px; height: 12px; border-radius: 2px; display: inline-block; }
        .loading { color: #999; font-style: italic; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="stats">
        <h2 id="title">PVMT</h2>
        <div id="stats-content" class="loading">Loading data...</div>
        <div class="layer-toggle" id="layer-toggles"></div>
    </div>
    <script>
        const layerColors = {
            pavements: '#6b7280',
            parking: '#3b82f6'
        };

        let map;

        async function init() {
            // Fetch config for center/zoom
            let center = [-121.76, 37.68];
            let zoom = 13;
            let projectName = 'PVMT';
            try {
                const cfgResp = await fetch('/api/config');
                if (cfgResp.ok) {
                    const cfg = await cfgResp.json();
                    center = [cfg.center_lon, cfg.center_lat];
                    projectName = cfg.project_name || 'PVMT';
                }
            } catch (e) {
                console.warn('Could not load config, using defaults');
            }
            document.getElementById('title').textContent = 'PVMT - ' + projectName;

            map = new maplibregl.Map({
                container: 'map',
                style: {
                    version: 8,
                    sources: {
                        'osm-tiles': {
                            type: 'raster',
                            tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],
                            tileSize: 256,
                            attribution: '&copy; OpenStreetMap contributors'
                        }
                    },
                    layers: [{
                        id: 'osm-tiles',
                        type: 'raster',
                        source: 'osm-tiles',
                        minzoom: 0,
                        maxzoom: 19
                    }]
                },
                center: center,
                zoom: zoom
            });

            map.on('load', loadData);
        }

        async function loadData() {
            try {
                const resp = await fetch('/api/stats?type=all');
                const data = await resp.json();

                let html = '';
                data.forEach(item => {
                    html += `
                        <div style="margin-bottom:8px">
                            <strong>${item.type}</strong>
                            <div class="stat-row">
                                <span class="stat-label">Area (sq ft)</span>
                                <span class="stat-value">${Math.round(item.total_area_sqft).toLocaleString()}</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">Area (acres)</span>
                                <span class="stat-value">${item.total_area_acres.toFixed(1)}</span>
                            </div>
                            <div class="stat-row">
                                <span class="stat-label">Features</span>
                                <span class="stat-value">${item.feature_count.toLocaleString()}</span>
                            </div>
                        </div>
                    `;

                    if (item.geojson) {
                        try {
                            const geojson = JSON.parse(item.geojson);
                            const sourceId = item.type + '-source';
                            const layerId = item.type + '-fill';

                            map.addSource(sourceId, {
                                type: 'geojson',
                                data: {
                                    type: 'Feature',
                                    geometry: geojson,
                                    properties: {}
                                }
                            });

                            map.addLayer({
                                id: layerId,
                                type: 'fill',
                                source: sourceId,
                                paint: {
                                    'fill-color': layerColors[item.type] || '#888',
                                    'fill-opacity': 0.5,
                                    'fill-outline-color': layerColors[item.type] || '#888'
                                }
                            });
                        } catch (e) {
                            console.warn('Failed to parse geojson for', item.type, e);
                        }
                    }
                });

                document.getElementById('stats-content').innerHTML = html || '<span class="loading">No data yet. Run pvmt ingest and pvmt compute first.</span>';

                // Layer toggles
                let toggleHtml = '';
                data.forEach(item => {
                    const color = layerColors[item.type] || '#888';
                    toggleHtml += `
                        <label>
                            <input type="checkbox" checked data-layer="${item.type}-fill">
                            <span class="legend-dot" style="background:${color}"></span>
                            ${item.type}
                        </label>
                    `;
                });
                document.getElementById('layer-toggles').innerHTML = toggleHtml;

                document.querySelectorAll('.layer-toggle input').forEach(cb => {
                    cb.addEventListener('change', (e) => {
                        const layerId = e.target.dataset.layer;
                        map.setLayoutProperty(layerId, 'visibility', e.target.checked ? 'visible' : 'none');
                    });
                });

                // Load hex grid overlay
                await loadHexGrid();

            } catch (e) {
                document.getElementById('stats-content').innerHTML = '<span class="loading">Error loading data. Is the server running?</span>';
                console.error(e);
            }
        }

        async function loadHexGrid() {
            try {
                const resp = await fetch('/api/hexstats?type=pavements');
                const fc = await resp.json();
                if (!fc.features || fc.features.length === 0) return;

                map.addSource('hex-grid', { type: 'geojson', data: fc });
                map.addLayer({
                    id: 'hex-fill',
                    type: 'fill',
                    source: 'hex-grid',
                    paint: {
                        'fill-color': [
                            'interpolate', ['linear'], ['get', 'pct_covered'],
                            0, '#f7fbff',
                            10, '#c6dbef',
                            25, '#6baed6',
                            50, '#2171b5',
                            75, '#08519c',
                            100, '#08306b'
                        ],
                        'fill-opacity': 0.6
                    }
                });
                map.addLayer({
                    id: 'hex-outline',
                    type: 'line',
                    source: 'hex-grid',
                    paint: {
                        'line-color': '#333',
                        'line-width': 0.5,
                        'line-opacity': 0.3
                    }
                });

                // Add hex toggle
                const toggles = document.getElementById('layer-toggles');
                toggles.innerHTML += `
                    <label>
                        <input type="checkbox" checked data-layer="hex-fill" data-outline="hex-outline">
                        <span class="legend-dot" style="background:linear-gradient(90deg,#c6dbef,#08306b)"></span>
                        hex grid
                    </label>
                `;
                toggles.querySelectorAll('input[data-outline]').forEach(cb => {
                    cb.addEventListener('change', (e) => {
                        const vis = e.target.checked ? 'visible' : 'none';
                        map.setLayoutProperty('hex-fill', 'visibility', vis);
                        map.setLayoutProperty('hex-outline', 'visibility', vis);
                    });
                });
            } catch (e) {
                console.warn('Hex grid not available:', e);
            }
        }

        init();
    </script>
</body>
</html>
