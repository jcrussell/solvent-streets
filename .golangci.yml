version: "2"

run:
  concurrency: 4
  build-cache: true
  timeout: 5m

linters:
  default: none
  enable:
    - bodyclose
    - dupl
    - errcheck
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - govet
    - ineffassign
    - misspell
    - nestif
    - nilnil
    - noctx
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    errcheck:
      exclude-functions:
        # Close on defers - errors rarely actionable
        - (io.Closer).Close
        - (*os.File).Close
        - (net.Conn).Close
        - (*compress/gzip.Writer).Close
        - (*archive/tar.Writer).Close
        - (*compress/gzip.Reader).Close
        # Print functions - rarely fail
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Print
        - fmt.Printf
        - fmt.Println
        # Tabwriter flush
        - (*text/tabwriter.Writer).Flush
        # Cleanup operations - best effort
        - os.Remove
        - os.RemoveAll
        - os.Unsetenv
        # HTTP response writes - errors rarely actionable
        - (net/http.ResponseWriter).Write
    gocognit:
      min-complexity: 20
    revive:
      rules:
        - name: indent-error-flow
        - name: if-return
        - name: receiver-naming
        - name: error-naming
        - name: error-return
        - name: increment-decrement

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/jcrussell/solvent-streets

output:
  show-stats: true
