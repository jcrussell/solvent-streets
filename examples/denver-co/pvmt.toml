# Denver, CO — custom forecast for cold climate
#
# Denver's freeze/thaw cycles accelerate pavement deterioration.
# This example uses a higher decay rate to reflect harsher conditions.

config_id = "denver-co"

[forecast]
decay_rate = 0.06
years = 15

[[cities]]
name = "Denver, CO"
overpass = true
# Nominatim returns a place=city node (Point geometry) for Denver; the
# admin_level=6 City-and-County boundary lives only as an OSM relation.
boundary_relation_id = 1411339
