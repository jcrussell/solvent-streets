# Boston, MA — northeast harsh winters example
#
# Boston's severe winters and road salt usage accelerate pavement
# deterioration. Higher decay rate and custom cost tiers reflect
# the more aggressive maintenance cycle needed.

config_id = "boston-ma"

[forecast]
decay_rate = 0.065
years = 15

[[forecast.cost_tiers]]
min_pci = 0
max_pci = 40
cost_per_sqm = 175.0
label = "Reconstruct"

[[forecast.cost_tiers]]
min_pci = 40
max_pci = 70
cost_per_sqm = 90.0
label = "Rehabilitate"

[[forecast.cost_tiers]]
min_pci = 70
max_pci = 100
cost_per_sqm = 20.0
label = "Preventive"

[[cities]]
name = "Boston, MA"
overpass = true
